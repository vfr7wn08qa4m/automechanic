# ADO Pipeline #2 — ДИСПЕТЧЕР CircleCI (каждые 2 часа).
# Смотрит очередь Task'ов по состояниям (New / ReadyForFilter / ReadyForEmbeding)
# и триггерит CircleCI, РАСПРЕДЕЛЯЯ нагрузку между аккаунтами по остатку бюджета
# минут (round-robin). Плюс триггерит краул форумов по зонам. Конфликтов нет:
# claim по System.Rev в ADO.
#
# Бюджет ADO 1800 мин/мес: каждые 2ч = ~360 прогонов/мес, timeout 6 -> лёгкий
# прогон (~1-2 мин), типично ~720 мин. Аккаунты CircleCI в variable group как
# секрет CI_ACCOUNTS_JSON — JSON-массив:
#   [{"name":"acc-a","circleci_token":"...","circleci_project_slug":"circleci/<org>/<proj>","circleci_definition_id":"<uuid>"}, ...]
# (пульт accounts.json -> deploy раздаёт в variable group).

trigger: none

schedules:
  - cron: "0 */2 * * *"        # каждые 2 часа
    displayName: dispatch-2h
    branches: { include: [main] }
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  - group: automech-secrets

jobs:
- job: dispatch
  timeoutInMinutes: 6          # прогон лёгкий (API-вызовы); кап на всякий случай
  steps:
  - task: UsePythonVersion@0
    inputs: { versionSpec: "3.12" }
  - script: pip install -r requirements.txt
    displayName: deps
  - script: python -m pipeline.controller dispatch --max-runs 6
    displayName: dispatch -> CircleCI (conveyor + краул, распределение)
    env:
      ADO_ORG: $(System.CollectionUri)
      ADO_PROJECT: $(System.TeamProject)
      ADO_PAT: $(ADO_PAT_SECRET)
      CI_ACCOUNTS_JSON: $(CI_ACCOUNTS_JSON)
      CI_MONTHLY_MINUTES: $(CI_MONTHLY_MINUTES)
      S3_ENDPOINT: $(S3_ENDPOINT)
      S3_KEY: $(S3_KEY)
      S3_SECRET: $(S3_SECRET)
      S3_BUCKET: $(S3_BUCKET)
